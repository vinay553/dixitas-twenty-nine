<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Connections Clone</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <header>
      <h1>Connections Clone</h1>
      <p>Find four groups of four related words.</p>
    </header>

    <section id="status" class="status" aria-live="polite" aria-label="Mistakes remaining">
      <div id="mistake-dots" class="mistake-dots" aria-hidden="true"></div>
      <span id="status-text" class="sr-only"></span>
    </section>

    <section id="solved-groups" class="solved-groups" aria-live="polite"></section>

    <section id="board" class="board" aria-label="Puzzle board"></section>

    <section class="controls">
      <button id="clear-btn" type="button">Clear</button>
      <button id="submit-btn" class="submit-btn" type="button">Submit Guess</button>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
